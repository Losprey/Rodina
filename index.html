<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FamilyWeek Master</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0C0C0E; --surface: rgba(28, 28, 30, 0.7); --surface-solid: #1C1C1E; --border: rgba(255, 255, 255, 0.08);
  --text: #FFFFFF; --text-dim: #A1A1AA; --acc: #FF6B35; --green: #34C759; --red: #FF3B30; --baby: #00D2D3;
  --radius: 20px; --base-fs: 15px;
}
[data-theme="light"] { --bg: #F2F2F7; --surface: rgba(255, 255, 255, 0.7); --surface-solid: #FFFFFF; --border: rgba(0, 0, 0, 0.08); --text: #1C1C1E; --text-dim: #636366; }
[data-theme="oled"] { --bg: #000000; --surface: rgba(20, 20, 20, 0.7); --surface-solid: #111111; --border: #222; }
[data-theme="nature"] { --bg: #0D1310; --surface: rgba(25, 35, 30, 0.7); --surface-solid: #1A2420; --acc: #30D158; }

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
html { font-size: var(--base-fs); }
body { background-color: var(--bg); color: var(--text); max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 100px; transition: all 0.3s ease; overflow-x: hidden; }

.glass { background: var(--surface); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--border); }
h1, .serif { font-family: 'Playfair Display', serif; font-weight: 800; }

/* --- SCREEN LOGIC --- */
.screen { display: none; animation: fadeIn 0.4s ease; padding: 1rem; }
.screen.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* --- COMPONENTS --- */
.card { background: var(--surface-solid); border-radius: var(--radius); padding: 1.2rem; margin-bottom: 0.8rem; border: 1px solid var(--border); }
.hero-card { background: linear-gradient(135deg, var(--acc), #B03A2E); border: none; color: white; }

.row-item { background: var(--surface-solid); padding: 0.8rem 1rem; border-radius: 15px; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
.section-title { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--text-dim); margin: 1.2rem 0 0.5rem 0.5rem; letter-spacing: 1px; }

/* --- PLANNER ACCORDION --- */
.day-card { background: var(--surface-solid); border-radius: 18px; margin-bottom: 0.6rem; border: 1px solid var(--border); overflow: hidden; }
.day-card.open { border-color: var(--acc); background: rgba(255,255,255,0.03); }
.day-header { padding: 0.8rem 1rem; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.day-body { display: none; padding: 0 1rem 1rem; border-top: 1px solid var(--border); }
.open .day-body { display: block; }
.meal-row { display: flex; justify-content: space-between; align-items: center; padding: 0.7rem 0; border-bottom: 1px solid var(--border); cursor: pointer; }
.meal-row:last-child { border-bottom: none; }

/* --- UI CONTROLS --- */
.btn-pill { background: var(--acc); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 15px; font-weight: 700; cursor: pointer; text-align: center; }
.btn-mini { padding: 6px 12px; border-radius: 10px; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-size: 0.7rem; font-weight: 700; cursor: pointer; }
.switch { position: relative; display: inline-block; width: 42px; height: 22px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; inset: 0; background-color: #333; transition: .3s; border-radius: 34px; }
.slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
input:checked + .slider { background-color: var(--acc); }
input:checked + .slider:before { transform: translateX(20px); }

/* --- NAV --- */
.nav-bar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 92%; height: 65px; border-radius: 25px; display: flex; justify-content: space-around; align-items: center; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-dim); text-decoration: none; font-size: 0.65rem; font-weight: 700; flex: 1; }
.nav-item.active { color: var(--acc); }
.nav-item i { font-size: 1.4rem; font-style: normal; margin-bottom: 2px; }

/* --- MODALS --- */
#onboarding { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: none; flex-direction: column; padding: 2.5rem; justify-content: center; }
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 2rem; }
.modal-content { background: var(--surface-solid); width: 100%; border-radius: 25px; padding: 1.5rem; border: 1px solid var(--border); max-height: 80vh; overflow-y: auto; }

#tut-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; display: none; }
.tut-bubble { position: absolute; background: var(--acc); color: white; padding: 20px; border-radius: 24px; width: 280px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); left: 50%; transform: translateX(-50%); }

input[type="text"], input[type="number"], select { width: 100%; padding: 10px; border-radius: 10px; background: var(--bg); border: 1px solid var(--border); color: white; outline: none; }
</style>
</head>
<body>

<!-- 1. ONBOARDING -->
<div id="onboarding">
    <div id="ob-1" class="ob-step active" style="text-align:center;">
        <h1 style="font-size: 3.5rem; line-height: 0.9;">Family<br><span style="color:var(--acc)">Week</span></h1>
        <p style="margin-top: 1.5rem; color: var(--text-dim);">Váš rodinný plánovač.</p>
        <input type="text" id="ob-name" placeholder="Meno rodiny" style="margin: 2rem 0; text-align: center;">
        <button class="btn-pill" style="width: 100%;" onclick="obGo(2)">POKRAČOVAŤ</button>
    </div>
    <div id="ob-2" class="ob-step" style="display:none;">
        <h2 class="serif">Čo už máte doma?</h2>
        <div class="pantry-grid" id="ob-pantry-grid"></div>
        <button class="btn-pill" style="width: 100%;" onclick="finishOnboarding()">DOKONČIŤ</button>
    </div>
</div>

<!-- 2. TUTORIAL -->
<div id="tut-overlay">
    <div id="tut-bubble" class="tut-bubble">
        <h3 id="tut-title" style="margin-bottom: 8px;"></h3>
        <p id="tut-text" style="font-size: 0.9rem; line-height: 1.5; margin-bottom: 1.2rem;"></p>
        <button onclick="nextTutStep()" class="btn-pill" style="background: white; color: var(--acc); width: 100%; padding: 0.6rem;">ĎALEJ</button>
    </div>
</div>

<!-- 3. HEADER -->
<header style="padding: 1.2rem 1.5rem; display: flex; justify-content: space-between; align-items: center;">
    <div class="serif" style="font-size: 1.4rem;">F<span style="color:var(--acc)">W</span></div>
    <div id="sync-status" style="font-size: 0.6rem; font-weight: 800; color: var(--green);">● LIVE SYNC</div>
</header>

<!-- SCREEN: DASHBOARD -->
<div id="scr-dash" class="screen active">
    <div class="card hero-card" id="card-hero">
        <small id="txt-date" style="opacity: 0.8; font-weight: 700; text-transform: uppercase; font-size: 0.65rem;"></small>
        <h2 id="txt-welcome" style="margin: 0.2rem 0 0.8rem;">Ahojte!</h2>
        <div class="glass" style="padding: 0.8rem; border-radius: 15px; border: none;">
            <small style="font-size: 0.55rem; font-weight: 800; opacity: 0.8; text-transform: uppercase;">Najbližšie jedlo 🍲</small>
            <div id="dash-meal" style="font-size: 1rem; font-weight: 700; margin-top: 2px;">Načítavam...</div>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1.2fr 1fr; gap: 0.6rem;">
        <div class="card" id="card-budget" style="margin:0;">
            <small class="section-title" style="margin:0; font-size: 0.55rem;">ROZPOČET</small>
            <div id="dash-budget" style="font-size: 1rem; font-weight: 800; margin: 4px 0;">0 / 400€</div>
            <div class="budget-bar"><div id="budget-fill" class="budget-fill"></div></div>
            <button class="btn-mini" style="width:100%; margin-top:5px; border:none; background:rgba(255,255,255,0.1);" onclick="addExpense()">+ PRIDAŤ</button>
        </div>
        <div class="card" style="margin:0; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:5px;" onclick="tab('planner')">
            <span style="font-size: 1.2rem;">📅</span>
            <small style="font-weight: 700; font-size: 0.65rem; color:var(--text-dim);">PLÁN</small>
        </div>
    </div>

    <p class="section-title">Úlohy</p>
    <div id="dash-tasks"></div>
</div>

<!-- SCREEN: PLANNER -->
<div id="scr-planner" class="screen">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1rem;">
        <h2 class="serif">Plánovač</h2>
        <div class="glass" style="display:flex; padding: 3px; border-radius: 10px;">
            <button id="m-rodina" onclick="setMode('rodina')" style="padding: 5px 12px; border-radius: 8px; border:none; background:var(--acc); color:white; font-size:0.65rem; font-weight:700; cursor:pointer;">RODINA</button>
            <button id="m-baby" onclick="setMode('baby')" style="padding: 5px 12px; border-radius: 8px; border:none; background:none; color:var(--text-dim); font-size:0.65rem; font-weight:700; cursor:pointer;">BABY</button>
        </div>
    </div>
    <div id="planner-list"></div>
</div>

<!-- SCREEN: SHOPPING -->
<div id="scr-shop" class="screen">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1rem;">
        <h2 class="serif">Nákup</h2>
        <button class="btn-pill" id="btn-wa" onclick="shareWA()" style="padding: 5px 12px; font-size: 0.7rem; background: #25D366;">WhatsApp</button>
    </div>
    <div id="shop-container"></div>
    <button class="btn-mini" style="width:100%; margin-top:10px; color:var(--text-dim);" onclick="clearShop()">VYMAZAŤ KÚPENÉ</button>
</div>

<!-- SCREEN: SETTINGS -->
<div id="scr-settings" class="screen">
    <h2 class="serif" style="margin-bottom: 1.2rem;">Nastavenia</h2>
    
    <div class="card glass">
        <label class="section-title" style="margin:0;">MENO RODINY</label>
        <input type="text" id="set-name" style="margin: 10px 0 20px;" onchange="updateSet()">

        <label class="section-title" style="margin:0;">VEĽKOSŤ TEXTU</label>
        <input type="range" min="13" max="22" step="1" id="fs-slider" oninput="updateSet()">
        
        <label class="section-title" style="margin: 20px 0 10px; display:block;">TÉMA</label>
        <div style="display:flex; gap:12px; align-items:center;">
            <div class="color-dot active" style="background:#FF6B35" onclick="setTheme('dark','#FF6B35', this)"></div>
            <div class="color-dot" style="background:#0A84FF" onclick="setTheme('ocean','#0A84FF', this)"></div>
            <div class="color-dot" style="background:#34C759" onclick="setTheme('nature','#34C759', this)"></div>
            <div class="color-dot" style="background:#FFFFFF" onclick="setTheme('light','#D4521A', this)"></div>
        </div>
    </div>

    <div class="card glass">
        <label class="section-title" style="margin:0;">OZNÁMENIA</label>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
            <span style="font-size:0.9rem;">Ranný plán (8:00)</span>
            <label class="switch"><input type="checkbox" id="cfg-morning" onchange="updateSet()"><span class="slider"></span></label>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
            <span style="font-size:0.9rem;">Mraznička (20:00)</span>
            <label class="switch"><input type="checkbox" id="cfg-defrost" onchange="updateSet()"><span class="slider"></span></label>
        </div>
    </div>

    <button class="btn-pill" style="background: none; color: var(--red); border: 1px solid var(--red); width: 100%;" onclick="resetAll()">RESET APPKY</button>
</div>

<!-- NAVIGATION BAR -->
<nav class="nav-bar glass">
    <a href="javascript:void(0)" class="nav-item active" id="nav-dash" onclick="tab('dash', this)"><i>🏠</i>Domov</a>
    <a href="javascript:void(0)" class="nav-item" id="nav-plan" onclick="tab('planner', this)"><i>📅</i>Plán</a>
    <a href="javascript:void(0)" class="nav-item" id="nav-shop" onclick="tab('shop', this)"><i>🛒</i>Nákup</a>
    <a href="javascript:void(0)" class="nav-item" id="nav-set" onclick="tab('settings', this)"><i>⚙️</i>Viac</a>
</nav>

<!-- MODAL PICKER -->
<div id="modal-picker" class="modal" onclick="if(event.target==this)closeModal()">
    <div class="modal-content">
        <h3 id="modal-title" style="margin-bottom: 1rem;">Vybrať jedlo</h3>
        <input type="text" id="m-search" placeholder="Hľadať recept..." oninput="filterMeals()">
        <div id="m-results" style="margin-top:1rem;"></div>
    </div>
</div>

<script>
const BASICS = ["Olej", "Múka", "Ryža", "Cukor", "Soľ", "Káva", "Mlieko", "Vajíčka", "Maslo", "Cibuľa"];
const MEAL_LABELS = ['Raňajky', 'Desiata', 'Obed', 'Olovrant', 'Večera'];
const MEAL_DB = [
    {n: "Pečené kura", i: ["kura", "ryža", "cibuľa"]}, {n: "Špagety Bolognese", i: ["mleté mäso", "cestoviny", "paradajky"]},
    {n: "Hubové rizoto", i: ["ryža", "šampiňóny", "smotana"]}, {n: "Losos so zemiakmi", i: ["losos", "zemiaky", "citrón"]},
    {n: "Halušky s bryndzou", i: ["zemiaky", "múka", "bryndza", "slanina"]}
];

let S = JSON.parse(localStorage.getItem('fw_master_final')) || {
  user: "", pantry: [], planR: {}, planB: {}, tasks: [], budget: 0, budgetLimit: 400,
  theme: "dark", accent: "#FF6B35", fontSize: 15, mode: "rodina", tutDone: false, notifs: {m: true, d: true}
};

function save() { localStorage.setItem('fw_master_final', JSON.stringify(S)); }

/* --- INITIALIZATION --- */
function init() {
    if(!S.user) {
        document.getElementById('onboarding').style.display = 'flex';
        document.getElementById('ob-pantry-grid').innerHTML = BASICS.map(item => `<div class="pantry-chip" onclick="this.classList.toggle('selected')">${item}</div>`).join('');
    } else {
        document.getElementById('onboarding').style.display = 'none';
        applyVisuals();
        updateDash();
        setMode(S.mode);
        if(!S.tutDone) setTimeout(startTutorial, 1000);
    }
}

function obGo(n) { 
    if(n === 2 && !document.getElementById('ob-name').value) return;
    document.getElementById('ob-1').style.display = 'none';
    document.getElementById('ob-2').style.display = 'flex';
}

function finishOnboarding() {
    S.user = document.getElementById('ob-name').value;
    document.querySelectorAll('.pantry-chip.selected').forEach(el => S.pantry.push(el.innerText.toLowerCase()));
    save(); init();
}

/* --- DASHBOARD --- */
function updateDash() {
    const now = new Date();
    document.getElementById('txt-date').innerText = now.toLocaleDateString('sk-SK', {weekday: 'long', day: 'numeric', month: 'long'});
    document.getElementById('txt-welcome').innerText = `Ahojte, ${S.user}! 👋`;
    
    const dayIdx = (now.getDay() + 6) % 7;
    const hour = now.getHours();
    let slot = 2; // Default obed
    if(hour < 10) slot = 0; else if(hour < 12) slot = 1; else if(hour > 18) slot = 4;
    
    const meal = (S.planR[dayIdx + '_' + slot]) || "Nič v pláne";
    document.getElementById('dash-meal').innerText = `${MEAL_LABELS[slot]}: ${meal}`;
    
    document.getElementById('dash-budget').innerText = `${S.budget}€ / ${S.budgetLimit}€`;
    document.getElementById('budget-fill').style.width = Math.min((S.budget/S.budgetLimit)*100, 100) + '%';
    
    renderDashTasks();
}

function renderDashTasks() {
    const cont = document.getElementById('dash-tasks');
    const openTasks = S.tasks.filter(t => !t.d).slice(0, 2);
    cont.innerHTML = openTasks.length === 0 ? `<p style="color:var(--text-dim); font-size:0.75rem; padding-left:10px;">Všetko hotové! 🎉</p>` :
    openTasks.map(t => `<div class="row-item" onclick="completeTask(${t.id})"><span>${t.t}</span><div style="width:18px; height:18px; border:2px solid var(--acc); border-radius:4px;"></div></div>`).join('');
}
function completeTask(id) { S.tasks.find(x => x.id === id).d = true; save(); updateDash(); }
function addTask(v) { if(!v) return; S.tasks.push({id:Date.now(), t:v, d:false}); document.getElementById('task-inp').value=''; save(); renderDashTasks(); }

/* --- PLANNER --- */
let curD, curM;
function renderPlanner() {
    const cont = document.getElementById('planner-list');
    const days = ['Pondelok','Utorok','Streda','Štvrtok','Piatok','Sobota','Nedeľa'];
    const today = (new Date().getDay() + 6) % 7;
    const plan = S.mode === 'rodina' ? S.planR : S.planB;

    cont.innerHTML = days.map((d, i) => `
        <div class="day-card" id="day-${i}">
            <div class="day-header" onclick="toggleDay(${i})">
                <div>
                    <b style="font-size:0.85rem;">${d} ${i === today ? '•' : ''}</b>
                    <div style="font-size:0.7rem; color:var(--text-dim);">${plan[i+'_2'] || 'Bez obeda'}</div>
                </div>
                <span>▼</span>
            </div>
            <div class="day-body">
                ${MEAL_LABELS.map((lbl, mi) => `
                    <div class="meal-row" onclick="openPicker(${i}, ${mi})">
                        <span style="font-size:0.65rem; font-weight:800; color:var(--acc); opacity:0.7;">${lbl}</span>
                        <span style="font-size:0.85rem; font-weight:600;">${plan[i+'_'+mi] || '---'}</span>
                    </div>`).join('')}
                <button class="btn-mini" style="width:100%; margin-top:10px;" onclick="swapWithTomorrow(${i})">🔄 VYMENIŤ SO ZAJTRAJKOM</button>
            </div>
        </div>`).join('');
}

function toggleDay(i) {
    const el = document.getElementById('day-'+i);
    const isOpen = el.classList.contains('open');
    document.querySelectorAll('.day-card').forEach(c => c.classList.remove('open'));
    if(!wasOpen) el.classList.add('open'); // Fixed logic below
}
// Fix pre toggleDay
function toggleDay(i) {
    const el = document.getElementById('day-'+i);
    if(el.classList.contains('open')) el.classList.remove('open');
    else {
        document.querySelectorAll('.day-card').forEach(c => c.classList.remove('open'));
        el.classList.add('open');
    }
}

function openPicker(d, m) { curD = d; curM = m; document.getElementById('modal-picker').style.display = 'flex'; filterMeals(); }
function closeModal() { document.getElementById('modal-picker').style.display = 'none'; }
function filterMeals() {
    const q = document.getElementById('m-search').value.toLowerCase();
    const res = MEAL_DB.filter(m => m.n.toLowerCase().includes(q));
    document.getElementById('m-results').innerHTML = res.map(m => `<div class="row-item" onclick="selectMeal('${m.n}')"><b>${m.n}</b> <button class="btn-mini" onclick="event.stopPropagation(); selectMeal('${m.n}', true)">NA 2 DNI</button></div>`).join('');
    if(q && res.length === 0) document.getElementById('m-results').innerHTML = `<button class="btn-pill" style="width:100%;" onclick="selectMeal('${q}')">Pridať: ${q}</button>`;
}
function selectMeal(n, twoDays=false) {
    const plan = S.mode === 'rodina' ? S.planR : S.planB;
    plan[curD + '_' + curM] = n;
    if(twoDays && curM === 2) plan[((curD+1)%7)+'_2'] = n + " (zvyšok)";
    save(); closeModal(); renderPlanner();
}
function swapWithTomorrow(i) {
    const plan = S.mode === 'rodina' ? S.planR : S.planB;
    const nxt = (i + 1) % 7;
    MEAL_LABELS.forEach((_, mi) => {
        const temp = plan[i+'_'+mi];
        plan[i+'_'+mi] = plan[nxt+'_'+mi];
        plan[nxt+'_'+mi] = temp;
    });
    save(); renderPlanner();
}

/* --- SHOPPING --- */
function renderShop() {
    const cont = document.getElementById('shop-container');
    let needed = new Set();
    [S.planR, S.planB].forEach(plan => {
        Object.values(plan).forEach(name => {
            if(name.includes("(zvyšok)")) return;
            const r = MEAL_DB.find(m => m.n === name);
            if(r) r.i.forEach(ing => { if(!S.pantry.includes(ing.toLowerCase())) needed.add(ing); });
        });
    });
    cont.innerHTML = needed.size === 0 ? `<p style="text-align:center; padding:3rem; color:var(--text-dim);">Prázdno.</p>` :
    Array.from(needed).map(item => `<div class="row-item"><span>${item}</span><input type="checkbox" class="shop-check" style="width:18px; height:18px;"></div>`).join('');
}
function clearShop() { document.querySelectorAll('.shop-check:checked').forEach(c => c.closest('.row-item').remove()); }

/* --- SYSTEM --- */
function setTheme(t, a, el) { 
    S.theme = t; S.accent = a; applyVisuals(); save(); setMode(S.mode); 
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
    el.classList.add('active');
}
function setMode(m) { 
    S.mode = m; 
    document.getElementById('m-rodina').style.background = m==='rodina'?S.accent:'none';
    document.getElementById('m-baby').style.background = m==='baby'?S.accent:'none';
    renderPlanner(); 
}
function applyVisuals() {
    document.documentElement.style.setProperty('--acc', S.accent);
    document.body.setAttribute('data-theme', S.theme);
    document.getElementById('set-name').value = S.user;
    document.getElementById('fs-slider').value = S.fontSize;
    document.documentElement.style.setProperty('--base-fs', S.fontSize + 'px');
}
function updateSet() {
    S.user = document.getElementById('set-name').value;
    S.fontSize = document.getElementById('fs-slider').value;
    S.notifs.m = document.getElementById('cfg-morning').checked;
    S.notifs.d = document.getElementById('cfg-defrost').checked;
    applyVisuals(); save();
}
function tab(id, btn) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('scr-' + id).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    if(btn) btn.classList.add('active');
    if(id === 'dash') updateDash();
    if(id === 'planner') renderPlanner();
    if(id === 'shop') renderShop();
}

/* --- TUTORIAL --- */
let tutStep = 0;
const tSteps = [{id:'card-hero', t:'Dnes na obed', p:'Tu uvidíš, čo sa varí.'}, {id:'card-budget', t:'Rozpočet', p:'Sledujte výdavky.'}];
function startTutorial() { document.getElementById('tut-overlay').style.display='block'; showTutStep(); }
function showTutStep() {
    const s = tSteps[tutStep];
    document.getElementById('tut-title').innerText = s.t;
    document.getElementById('tut-text').innerText = s.p;
    const rect = document.getElementById(s.id).getBoundingClientRect();
    document.getElementById('tut-bubble').style.top = (rect.top < 300) ? (rect.bottom + 20) + 'px' : (rect.top - 200) + 'px';
}
function nextTutStep() { tutStep++; if(tutStep < tSteps.length) showTutStep(); else { document.getElementById('tut-overlay').style.display='none'; S.tutDone=true; save(); } }
function addExpense() { const a=prompt("Suma (€):"); if(a) { S.budget += parseFloat(a); save(); updateDash(); } }
function shareWA() {
    let t = "*NÁŠ NÁKUP 🛒*\n\n";
    document.querySelectorAll('#shop-container span').forEach(s => t += "• " + s.innerText + "\n");
    window.open("whatsapp://send?text=" + encodeURIComponent(t));
}
function resetAll() { if(confirm("Naozaj resetovať?")) { localStorage.clear(); location.reload(); } }

window.onload = init;
</script>
