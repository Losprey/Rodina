<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FamilyWeek Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0C0C0E;
  --surface: rgba(28, 28, 30, 0.7);
  --surface-solid: #1C1C1E;
  --border: rgba(255, 255, 255, 0.08);
  --text: #FFFFFF;
  --text-dim: #A1A1AA;
  --acc: #FF6B35;
  --green: #34C759;
  --radius: 20px;
  --base-fs: 15px;
}

[data-theme="light"] { --bg: #F2F2F7; --surface: rgba(255, 255, 255, 0.7); --surface-solid: #FFFFFF; --border: rgba(0, 0, 0, 0.05); --text: #1C1C1E; --text-dim: #636366; }

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
html { font-size: var(--base-fs); }
body { background-color: var(--bg); color: var(--text); max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 100px; transition: background 0.4s; overflow-x: hidden; }

.glass { background: var(--surface); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--border); }

/* --- NAVIGATION --- */
.screen { display: none; animation: fadeIn 0.4s ease; padding: 1rem; }
.screen.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* --- DASHBOARD ELEMENTS --- */
.hero-card {
  background: linear-gradient(135deg, var(--acc), #B03A2E);
  border-radius: var(--radius);
  padding: 1.5rem;
  color: white;
  margin-bottom: 1rem;
}

.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 1rem; }
.mini-card { background: var(--surface-solid); padding: 1rem; border-radius: var(--radius); border: 1px solid var(--border); }

/* --- LISTS --- */
.row-item {
  background: var(--surface-solid);
  padding: 1rem;
  border-radius: 15px;
  margin-bottom: 0.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 1px solid var(--border);
}
.section-title { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: var(--text-dim); margin: 1.5rem 0 0.5rem 0.5rem; letter-spacing: 1px; }

/* --- NAV BAR --- */
.nav-bar {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  width: 90%; height: 65px; border-radius: 25px;
  display: flex; justify-content: space-around; align-items: center;
  z-index: 2000; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
}
.nav-item {
  display: flex; flex-direction: column; align-items: center;
  color: var(--text-dim); text-decoration: none; font-size: 0.65rem; font-weight: 700;
}
.nav-item i { font-size: 1.4rem; font-style: normal; margin-bottom: 3px; }
.nav-item.active { color: var(--acc); }

/* --- UTILS --- */
.btn-pill { background: var(--acc); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 15px; font-weight: 700; width: 100%; cursor: pointer; }
.color-dot { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; }

#onboarding { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; justify-content: center; padding: 2rem; text-align: center; }

.modal {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000;
  display: none; align-items: center; justify-content: center; padding: 2rem;
}
.modal-content { background: var(--surface-solid); width: 100%; border-radius: 25px; padding: 1.5rem; border: 1px solid var(--border); }
</style>
</head>
<body data-theme="dark">

<!-- ONBOARDING -->
<div id="onboarding" style="display:none;">
    <h1 style="font-family:'Playfair Display'; font-size: 3rem; margin-bottom: 1rem;">FamilyWeek</h1>
    <p style="color: var(--text-dim); margin-bottom: 2rem;">Vaša rodinná základňa.</p>
    <input type="text" id="ob-name" placeholder="Meno rodiny" style="width:100%; padding: 1.2rem; border-radius: 15px; background: var(--surface-solid); border: 1px solid var(--border); color: white; margin-bottom: 1rem; text-align: center;">
    <button class="btn-pill" onclick="finishOnboarding()">ZAČAŤ →</button>
</div>

<!-- OBRAZOVKA: DASHBOARD (DOMOV) -->
<div id="scr-dash" class="screen active">
  <div class="hero-card">
    <small id="txt-date" style="opacity: 0.8; font-weight: 700;"></small>
    <h1 id="txt-welcome" style="margin: 0.5rem 0 1.2rem;">Ahojte!</h1>
    <div style="background: rgba(255,255,255,0.15); padding: 1rem; border-radius: 15px;">
      <small style="font-size: 0.6rem; font-weight: 800; opacity: 0.8; text-transform: uppercase;">Dnes na obed 🍲</small>
      <div id="dash-meal" style="font-size: 1.1rem; font-weight: 700; margin-top: 3px;">Načítavam...</div>
    </div>
  </div>

  <div class="stat-grid">
    <div class="mini-card">
      <small class="section-title" style="margin:0; font-size: 0.55rem;">ROZPOČET</small>
      <div id="dash-budget" style="font-size: 1.1rem; font-weight: 800; margin: 5px 0;">0 / 400€</div>
      <div style="height:4px; background: var(--border); border-radius:2px;"><div id="budget-fill" style="height:100%; background: var(--green); width: 0%;"></div></div>
    </div>
    <div class="mini-card" onclick="tab('planner')">
      <small class="section-title" style="margin:0; font-size: 0.55rem;">PLÁN</small>
      <div style="font-size: 0.85rem; font-weight: 600; margin-top: 5px;">Zobraziť týždeň →</div>
    </div>
  </div>

  <p class="section-title">Úlohy na dnes</p>
  <div id="dash-tasks"></div>
</div>

<!-- OBRAZOVKA: PLÁNOVAČ -->
<div id="scr-planner" class="screen">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1.5rem;">
    <h2 class="serif" style="font-size: 2rem;">Plánovač</h2>
    <div class="glass" style="display:flex; padding: 4px; border-radius: 12px;">
        <button id="m-rodina" onclick="setMode('rodina')" style="padding: 6px 12px; border-radius: 8px; border:none; background:var(--acc); color:white; font-size:0.7rem; font-weight:700;">RODINA</button>
        <button id="m-baby" onclick="setMode('baby')" style="padding: 6px 12px; border-radius: 8px; border:none; background:none; color:var(--text-dim); font-size:0.7rem; font-weight:700;">BABY</button>
    </div>
  </div>
  <div id="planner-list"></div>
</div>

<!-- OBRAZOVKA: NÁKUP -->
<div id="scr-shop" class="screen">
  <h2 class="serif" style="font-size: 2rem; margin-bottom: 1.5rem;">Nákupný zoznam</h2>
  <div id="shop-container"></div>
  <button class="btn-pill" onclick="shareWA()" style="margin-top: 1rem; background: #25D366;">POSLAŤ NA WHATSAPP</button>
</div>

<!-- OBRAZOVKA: NASTAVENIA -->
<div id="scr-settings" class="screen">
  <h2 class="serif" style="font-size: 2rem; margin-bottom: 1.5rem;">Nastavenia</h2>
  <div class="mini-card" style="margin-bottom: 1rem;">
    <p class="section-title" style="margin-top:0;">Veľkosť textu</p>
    <input type="range" min="12" max="22" value="15" oninput="updateFS(this.value)" style="width:100%; accent-color: var(--acc);">
    
    <p class="section-title">Téma</p>
    <div style="display:flex; gap:10px; margin-top: 10px;">
        <div class="color-dot" style="background:#FF6B35" onclick="setAcc('#FF6B35')"></div>
        <div class="color-dot" style="background:#0A84FF" onclick="setAcc('#0A84FF')"></div>
        <div class="color-dot" style="background:#34C759" onclick="setAcc('#34C759')"></div>
        <div class="color-dot" style="background:#FFFFFF" onclick="toggleLightMode()"></div>
    </div>
  </div>
  <button class="btn-pill" style="background: none; color: var(--red); border: 1px solid var(--red);" onclick="resetAll()">RESET APLIKÁCIE</button>
</div>

<!-- NAV BAR -->
<nav class="nav-bar glass">
  <a href="javascript:void(0)" class="nav-item active" onclick="tab('dash', this)"><i>🏠</i>Domov</a>
  <a href="javascript:void(0)" class="nav-item" onclick="tab('planner', this)"><i>📅</i>Plán</a>
  <a href="javascript:void(0)" class="nav-item" onclick="tab('shop', this)"><i>🛒</i>Nákup</a>
  <a href="javascript:void(0)" class="nav-item" onclick="tab('settings', this)"><i>⚙️</i>Viac</a>
</nav>

<!-- MEAL PICKER MODAL -->
<div id="modal-picker" class="modal" onclick="if(event.target==this)closeModal()">
    <div class="modal-content">
        <h3 style="margin-bottom: 1rem;">Čo budeme variť?</h3>
        <input type="text" id="m-search" placeholder="Hľadať..." style="width:100%; padding: 1rem; border-radius: 12px; background: var(--bg); border: 1px solid var(--border); color: white; outline: none;" oninput="filterMeals()">
        <div id="m-results" style="margin-top: 1rem; max-height: 200px; overflow-y: auto;"></div>
    </div>
</div>

<script>
const MEAL_DB = [
    {n: "Pečené kura", i: ["kura", "ryža"]},
    {n: "Špagety Bolognese", i: ["mäso", "cestoviny"]},
    {n: "Hubové rizoto", i: ["ryža", "huby"]},
    {n: "Losos", i: ["losos", "zemiaky"]},
    {n: "Halušky", i: ["zemiaky", "múka", "bryndza"]}
];

let S = JSON.parse(localStorage.getItem('fw_final_v1')) || {
  user: "", planR: {}, planB: {}, tasks: [], budget: 0, budgetLimit: 400,
  theme: "dark", accent: "#FF6B35", fontSize: 15, mode: "rodina"
};

function save() { localStorage.setItem('fw_final_v1', JSON.stringify(S)); }

/* --- NAVIGATION SYSTEM --- */
function tab(id, btn) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('scr-' + id).classList.add('active');
    
    if(btn) {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        btn.classList.add('active');
    }

    if(id === 'dash') updateDash();
    if(id === 'planner') renderPlanner();
    if(id === 'shop') renderShop();
}

/* --- DASHBOARD LOGIC --- */
function updateDash() {
    const now = new Date();
    document.getElementById('txt-date').innerText = now.toLocaleDateString('sk-SK', {weekday: 'long', day: 'numeric', month: 'long'});
    document.getElementById('txt-welcome').innerText = `Ahojte, ${S.user}! 👋`;
    
    const dayKey = ((now.getDay() + 6) % 7) + '_Obed';
    document.getElementById('dash-meal').innerText = S.planR[dayKey] || "Dnes nič v pláne";
    
    document.getElementById('dash-budget').innerText = `${S.budget} / ${S.budgetLimit}€`;
    document.getElementById('budget-fill').style.width = Math.min((S.budget/S.budgetLimit)*100, 100) + '%';
    
    renderDashTasks();
}

function renderDashTasks() {
    const cont = document.getElementById('dash-tasks');
    const openTasks = S.tasks.filter(t => !t.d).slice(0, 3);
    if(openTasks.length === 0) {
        cont.innerHTML = `<p style="color:var(--text-dim); font-size:0.8rem; padding: 10px;">Všetko hotové! 🎉</p>`;
        return;
    }
    cont.innerHTML = openTasks.map(t => `<div class="row-item" style="padding:0.7rem 1rem;"><span style="font-size:0.85rem;">${t.t}</span><div style="width:18px; height:18px; border:2px solid var(--acc); border-radius:4px;" onclick="completeTask(${t.id})"></div></div>`).join('');
}

function completeTask(id) { S.tasks.find(x => x.id === id).d = true; save(); updateDash(); }

/* --- PLANNER LOGIC --- */
let curD;
function renderPlanner() {
    const cont = document.getElementById('planner-list');
    const days = ['Pondelok','Utorok','Streda','Štvrtok','Piatok','Sobota','Nedeľa'];
    const today = (new Date().getDay() + 6) % 7;
    
    cont.innerHTML = days.map((d, i) => {
        const val = (S.mode==='rodina'?S.planR:S.planB)[i+'_Obed'] || 'Pridať obed...';
        return `
        <div class="row-item ${i===today?'today':''}" onclick="openPicker(${i})">
            <div>
                <b style="font-size:0.9rem;">${d}</b>
                <div style="font-size:0.75rem; color:var(--text-dim);">${val}</div>
            </div>
            <span style="color:var(--acc); font-weight:900;">+</span>
        </div>`;
    }).join('');
}

function openPicker(d) {
    curD = d;
    document.getElementById('modal-picker').style.display = 'flex';
    filterMeals();
}
function closeModal() { document.getElementById('modal-picker').style.display = 'none'; }

function filterMeals() {
    const q = document.getElementById('m-search').value.toLowerCase();
    const res = MEAL_DB.filter(m => m.n.toLowerCase().includes(q));
    document.getElementById('m-results').innerHTML = res.map(m => `
        <div class="row-item" style="margin-bottom:5px;" onclick="selectMeal('${m.n}')">
            <b>${m.n}</b>
        </div>`).join('');
}

function selectMeal(n) {
    const plan = S.mode === 'rodina' ? S.planR : S.planB;
    plan[curD + '_Obed'] = n;
    save(); closeModal(); renderPlanner();
}

/* --- SHOPPING LOGIC --- */
function renderShop() {
    const cont = document.getElementById('shop-container');
    let needed = new Set();
    Object.values(S.planR).forEach(name => {
        const r = MEAL_DB.find(m => m.n === name);
        if(r) r.i.forEach(ing => needed.add(ing));
    });
    
    if(needed.size === 0) {
        cont.innerHTML = `<p style="text-align:center; padding:3rem; color:var(--text-dim);">Zoznam je prázdny.<br>Naplánujte si jedlá.</p>`;
        return;
    }
    cont.innerHTML = [...needed].map(item => `
        <div class="row-item">
            <span>${item}</span>
            <input type="checkbox" style="width:20px; height:20px; accent-color:var(--acc);">
        </div>`).join('');
}

/* --- SETTINGS & CORE --- */
function updateFS(v) { S.fontSize = v; applyVisuals(); save(); }
function setAcc(v) { S.accent = v; applyVisuals(); save(); }
function setMode(m) { S.mode = m; renderPlanner(); }
function applyVisuals() {
    document.documentElement.style.setProperty('--base-fs', S.fontSize + 'px');
    document.documentElement.style.setProperty('--acc', S.accent);
    document.body.setAttribute('data-theme', S.theme);
}
function finishOnboarding() {
    const val = document.getElementById('ob-name').value.trim();
    if(val) { S.user = val; save(); document.getElementById('onboarding').style.display='none'; init(); }
}
function init() {
    if(!S.user) { document.getElementById('onboarding').style.display='flex'; }
    else { applyVisuals(); updateDash(); }
}
function resetAll() { if(confirm("Zmazať všetko?")) { localStorage.clear(); location.reload(); } }

window.onload = init;
</script>
</body>
</html>
